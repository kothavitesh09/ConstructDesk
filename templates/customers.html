{% extends "base.html" %}
{% block content %}
<div class="page-head"><div><p class="eyebrow">CRM</p><h1>Customers</h1></div><a class="btn btn-primary btn-sm" href="{{ url_for('customers.new') }}"><i class="bi bi-person-plus"></i> New Booking</a></div>
<form method="get" class="panel filter-bar"><input name="q" class="form-control form-control-sm" placeholder="Search customer, phone, Aadhaar, PAN" value="{{ q }}"><button class="btn btn-primary btn-sm">Search</button></form>
<div class="panel mt-3"><div class="table-responsive"><table class="table table-sm erp-table data-table"><thead><tr><th>Name</th><th>Phone</th><th>Email</th><th>Aadhaar</th><th>PAN</th><th>Address</th></tr></thead><tbody>{% for c in customers %}<tr><td><a class="table-link" href="{{ url_for('customers.profile', customer_id=c._id) }}">{{ c.name }}</a></td><td>{{ c.phone }}</td><td>{{ c.email }}</td><td>{{ c.aadhaar }}</td><td>{{ c.pan }}</td><td>{{ c.address }}</td></tr>{% endfor %}</tbody></table></div></div>
{% endblock %}

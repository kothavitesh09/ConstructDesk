{% extends "auth_base.html" %}
{% block content %}
<div class="auth-heading">
  <p>New company</p>
  <h1>Create Company Account</h1>
</div>
<form method="post" class="auth-form auth-form-grid">
  <label>Company Name<input required name="company_name"></label>
  <label>Owner Name<input required name="owner_name"></label>
  <label>Mobile Number<input required name="phone"></label>
  <label>Email<input required type="email" name="email"></label>
  <label>Password<input required type="password" name="password"></label>
  <label>Confirm Password<input required type="password" name="confirm_password"></label>
  <label>GST Number<input name="gst_number"></label>
  <label>Address<textarea name="address" rows="3"></textarea></label>
  <button class="btn btn-primary w-100 auth-form-submit" type="submit"><i class="bi bi-send"></i> Submit Registration</button>
  <a class="auth-form-submit" href="{{ url_for('auth.landing') }}">Back to access options</a>
</form>
{% endblock %}
